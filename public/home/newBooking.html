<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="./bootstrap-5.2.3-dist/css/bootstrap.css">
    <link rel="stylesheet" href="./css/book.css">
    <title>Cinema Tickets</title>
</head>
<body>
    <header class="navbar navbar-expand-md text-white fixed-top">
        <div class="container">
            
            <img src="./img/header logo 103.png" class="nav_img img-fluid" alt="">

            <button class="navbar-toggler" 
                type="button" 
                data-bs-toggle="collapse"  
                data-bs-target="#mainMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a href="#" class="nav-link" >Home</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">Cinemas</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">Movies</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">FAQ</a></li>
                </ul>
            </div>
        </div>
    </header>
    
    <div class=" text-light  text-center text-sm-start py-5" >
        <div class="container pt-5">
            <div class="row" id="container_1">

                <div class="col-lg-4 col-md-5 col-12" id="poster">
                    <img src="./img/posters/avatar.jpg" class="img-thumbnail" alt="...">
                </div>
                <div class="col-lg-4 col-md-6 col-12" id="select">
                        <form action="./theater.html" method="post" class="mid">
                        
                            <select class="form-select my-3" aria-label="Default select example">
                                <option selected>Select Cenima</option>
                                <option value="1">Galaxy</option>
                                <option value="2">Metro</option>
                                <option value="3">Luxurito</option>
                                <option value="4">Plaza</option>
                            </select>
                            <select class="form-select my-3" aria-label="Default select example">
                                <option selected>Choose Date</option>
                                <option value="21/5/2023">21/5/2023</option>
                                <option value="17/5/2023">17/5/2023</option>
                                <option value="16/5/2023">16/5/2023</option>
                                <option value="18/5/2023">18/5/2023</option>
                            </select>
                            <select class="form-select my-3" aria-label="Default select example">
                                <option selected>ShowTime</option>
                                <option value="09:00">09:00</option>
                                <option value="12:00">12:00</option>
                                <option value="15:00">15:00</option>
                                <option value="18:00">18:00</option>
                            </select>
                            <select class="form-select my-3" aria-label="Default select example">
                                <option selected>Screen</option>
                                <option value="1">One</option>
                                <option value="2">Two</option>
                                <option value="3">Three</option>
                            </select>
                        
                        <button type="submit" class="btn btn-primary mb-3"> Next <span>></span></button>
        
                    </form>
                </div>
                <div class="col-lg-4 col-md-12 col-12">
                    <div class="table-responsive py-3">
                        <table class="table table-success table-striped">
                            <tbody>
                                <tr>
                                    <td class="nt">Name</td>
                                    <td class="nt2">john wick chapter 4</td>
                                </tr>
                                <tr>
                                    <td>Rate</td>
                                    <td>8.4/10</td>
                                </tr>
                                <tr>
                                    <td>Language</td>
                                    <td>UNITED-STATE</td>
                                </tr>
                                <tr>
                                    <td>Kind</td>
                                    <td>Action</td>
                                </tr>
                                <tr>
                                    <td>Category</td>
                                    <td>PG-13</td>
                                </tr>
                                <tr>
                                    <td>Duration</td>
                                    <td>3h </td>
                                </tr>
                                <tr>
                                    <td>Release Date</td>
                                    <td>9 jun 2023</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
            

    </div>

    <section class=" text-light text-center text-sm-start" id="container_2">

        
        <div class="container " >
            <div class="row">
                <h1 class="text-center">Trailer</h1>

                <div class="ratio ratio-16x9 my-3">
                    <iframe src="./video/Avatar_ The Way of Water _ Official Trailer.mp4" title="MOVIE TRAILER" allowfullscreen></iframe>
                    </div>


            </div>


        </div>

    </section>
    

    <footer>
        <p>&copy; 2023 Cinema Booking Website. All rights reserved.</p>
    </footer>
    
    <script src="./bootstrap-5.2.3-dist/js/bootstrap.js"></script>
</body>
</html>
